project:
  name: Dependency Operations

labels:
  base:
    - dependencies

  risk:
    low: risk:low
    medium: risk:medium
    high: risk:high

  routing:
    automerge: automerge:eligible
    review: needs-human-review
    safe_out: agent:safe-out
    stale: stale:dependency-pr

risk:
  high_keywords:
    - auth
    - crypto
    - payment
    - database
    - orm
    - framework
    - terraform
    - kubernetes
    - docker

  low_keywords:
    - eslint
    - prettier
    - jest
    - pytest
    - docs

stale:
  days_without_activity: 7

summary:
  issue_title: Dependency Operations Summary

automerge:
  require:
    - risk:low
    - checks_passing
